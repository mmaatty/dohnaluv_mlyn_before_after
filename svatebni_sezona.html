<title>Svatební sezóna — Dohnalův mlýn</title>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg: #f6f7f9;
  --panel: #ffffff;
  --panel-2: #f1f2f4;
  --line: #e5e7eb;
  --paper: #18181b;
  --ink: #18181b;
  --paper-dim: #71717a;
  --water: #4f46e5;
  --water-dim: #4f46e5;
  --wheat: #f59e0b;
  --wheat-dim: #9ca3af;
  --red: #ef4444;
  --green: #22c55e;
  --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--paper);font-family:'Inter',sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;}
.wrap{max-width:780px;margin:0 auto;padding:32px 20px 72px;}
.brand{font-family:'Inter',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--water);}
h1{font-family:'Inter',sans-serif;font-weight:600;font-size:26px;letter-spacing:-0.02em;margin:4px 0 24px;}
.muted{color:var(--paper-dim);}
.mono{font-family:'JetBrains Mono',monospace;}

button{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;background:var(--panel);color:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 14px;cursor:pointer;transition:border-color .15s,background .15s,box-shadow .15s;}
button:hover{border-color:#cdd0d6;background:var(--panel-2);}
button.primary{background:var(--water);border-color:var(--water);color:#fff;}
button.primary:hover{background:#4338ca;border-color:#4338ca;}
button.ghost{background:transparent;border-color:transparent;color:var(--paper-dim);padding:6px 8px;}
button.ghost:hover{color:var(--paper);}
button.danger{color:var(--red);}
button.danger:hover{border-color:var(--red);}
button.small{padding:5px 10px;font-size:12px;}
.btn-link{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;background:var(--panel-2);color:var(--paper);border:1px solid var(--line);border-radius:7px;padding:8px 14px;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-link:hover{border-color:var(--water);}

input,select,textarea{font-family:'Inter',sans-serif;font-size:13px;color:var(--paper);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:8px 10px;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--water);box-shadow:0 0 0 3px rgba(79,70,229,.12);}
label{font-size:11px;color:var(--paper-dim);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
.field{margin-bottom:12px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);}
.section-title{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--paper-dim);margin-bottom:12px;}
.empty{text-align:center;padding:60px 20px;color:var(--paper-dim);}
.empty .wheel{margin:0 auto 18px;}

.wedding-row{display:flex;align-items:center;gap:14px;cursor:pointer;}
.wedding-row:hover .coupleName{color:var(--water);}
.coupleName{font-family:'Inter',sans-serif;font-weight:600;font-size:16px;letter-spacing:-0.01em;transition:color .15s;}
.wedding-meta{font-size:12px;color:var(--paper-dim);margin-top:2px;}
.wedding-next{font-size:12px;margin-top:4px;}
.row-right{margin-left:auto;}

.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge.ok{background:var(--green);color:#1b2614;}
.badge.soon{background:var(--wheat);color:#3a2c0c;}
.badge.late{background:var(--red);color:#fff;}
.badge.done,.badge.neutral{background:var(--panel-2);color:var(--paper-dim);}

.modal-bg{position:fixed;inset:0;background:rgba(24,24,27,0.40);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;width:380px;max-width:100%;box-shadow:0 10px 30px rgba(16,24,40,.18);}
.modal h2{font-family:'Inter',sans-serif;font-size:18px;margin:0 0 16px;font-weight:600;letter-spacing:-0.01em;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

.detail-head{display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.back{cursor:pointer;color:var(--paper-dim);font-size:13px;margin-bottom:14px;display:inline-flex;align-items:center;gap:5px;}
.back:hover{color:var(--paper);}
.detail-title{font-family:'Inter',sans-serif;font-size:22px;font-weight:600;letter-spacing:-0.02em;}
.detail-date{color:var(--paper-dim);font-size:13px;margin-top:2px;}
.progress-track{height:6px;background:var(--panel-2);border-radius:4px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:var(--water);transition:width .3s;}

.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);}
.tab{padding:8px 4px;font-size:13px;color:var(--paper-dim);cursor:pointer;border-bottom:2px solid transparent;margin-right:18px;}
.tab.active{color:var(--water);border-bottom-color:var(--water);font-weight:600;}

.phase{margin-bottom:12px;}
.phase-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--wheat-dim);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.item{display:grid;grid-template-columns:20px 1fr auto;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);align-items:center;}
.item:last-child{border-bottom:none;}
.checkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--paper-dim);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;}
.checkbox.checked{background:var(--green);border-color:var(--green);color:#1b2614;}
.item-body{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;flex-direction:column;}
.item-body-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.item-label{font-size:13px;}
.item-label.checked{color:var(--paper-dim);text-decoration:line-through;}
.item-link{font-size:12px;color:var(--water);text-decoration:none;}
.item-link:hover{text-decoration:underline;}
.item-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:6px;}
.chip button{padding:0;background:none;border:none;color:var(--paper-dim);font-size:13px;line-height:1;cursor:pointer;}
.chip button:hover{color:var(--red);}
.add-name-row{display:flex;gap:8px;margin-top:8px;}
.add-name-row input{flex:1;}

table.fin{width:100%;border-collapse:collapse;font-size:13px;}
table.fin th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--paper-dim);padding:6px 4px;border-bottom:1px solid var(--line);}
table.fin td{padding:7px 4px;border-bottom:1px solid var(--line);vertical-align:middle;}
table.fin td.num{text-align:right;font-family:'JetBrains Mono',monospace;}
table.fin tr.total td{border-top:1.5px solid var(--wheat-dim);border-bottom:none;font-weight:600;padding-top:10px;}
.fin-label-input{width:100%;}
.shift-grid{display:grid;grid-template-columns:1fr 60px 60px 70px 30px;gap:6px;align-items:center;}
.shift-grid input{padding:6px 8px;font-size:12px;}
.flat-grid{display:grid;grid-template-columns:1fr 100px 30px;gap:6px;align-items:center;}
.flat-grid input{padding:6px 8px;font-size:12px;}

textarea#msg-preview{width:100%;min-height:220px;font-family:'JetBrains Mono',monospace;font-size:12px;white-space:pre-wrap;resize:vertical;}
.send-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.note-small{font-size:11px;color:var(--paper-dim);margin-top:8px;}

function importSeedWeddings(){
  const existingDates = new Set(weddings.map(w => w.date));
  let added = 0;
  SEED_WEDDINGS.forEach(s => {
    if(existingDates.has(s.date)) return;
    const couple = SEED_NAMES[s.date] || `Svatba ${fmt(new Date(s.date))}`;
    const nw = freshWedding(couple, s.date);
    nw.coordinator = s.coord || '';
    nw.guests = s.guests;
    nw.staffPlanned = s.staff;
    nw.serviceNames = [...(s.service||[])];
    nw.cleaningNames = [...(s.cleaning||[])];
    nw.contactEmail = SEED_EMAILS[s.date] || '';
    nw.contactPhone = SEED_PHONES[s.date] || '';
    weddings.push(nw);
    added++;
  });
  persist();
  render();
  return added;
}

  if(!w.finance || typeof w.finance !== 'object') w.finance = { shifts:[], flatItems:[] };
  if(!Array.isArray(w.finance.shifts)) w.finance.shifts = [];
  if(!Array.isArray(w.finance.flatItems)) w.finance.flatItems = [];
  if(!w.sentAutomations) w.sentAutomations = {};
  if(!w.items || typeof w.items !== 'object') w.items = freshItemsState();
  ALL_ITEMS.forEach(i => { if(!w.items[i.key]) w.items[i.key] = { done:false, note:'' }; });
  AUTOMATIONS.forEach(a => { if(a.itemKey && w.sentAutomations[a.key] && w.items[a.itemKey]) w.items[a.itemKey].done = true; });
  return w;
}

function getAutomationEmailBody(w, emailType){
  if(emailType === 'guestbook'){
    const vars = { coupleName: w.coupleName, link: w.guestbookLink, signature: settings.signature };
    return { subject: fillTemplate('Kniha hostů – {coupleName}', vars), body: fillTemplate('Dobrý den,\n\nníže posíláme knihu hostů, prosíme vás o včasné vyplnění.\n\n{link}\n\nHezký den,\n{signature}', vars) };
  }
  if(emailType === 'calculation') return { subject: `Předběžná kalkulace — ${w.coupleName}`, body: buildPreliminaryCalcEmailBody(w) };
  if(emailType === 'final_invoice') return { subject: `Finální vyúčtování — ${w.coupleName}`, body: buildFinalInvoiceEmailBody(w) };
  if(emailType === 'thank_you') return { subject: `Děkujeme za vaši svatbu na Dohnalově mlýně`, body: buildThankYouEmailBody(w) };

function collectPendingAutomations(){
  const today = todayMid();
  const pending = [];
  weddings.forEach(w => {
    if(!w.contactEmail) return;
    const wDate = dateOnly(w.date);
    AUTOMATIONS.forEach(a => {
      if(w.sentAutomations[a.key]) return;
      const triggerDate = addDays(wDate, a.offsetDays);
      if(triggerDate <= today){
        if(a.emailType === 'guestbook' && !w.guestbookLink) return;
        pending.push({ w, a });
      }
    });
  });
  return pending;
}

let gisTokenClient = null;
let gmailAccessToken = null;
let gmailTokenExpiresAt = 0;
const GMAIL_SCOPE = 'https://www.googleapis.com/auth/gmail.send';

function gmailConnected(){ return !!gmailAccessToken && Date.now() < gmailTokenExpiresAt; }

function initGis(){
  if(!window.google || !window.google.accounts || !settings.googleClientId){ gisTokenClient = null; return; }
  gisTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: settings.googleClientId,
    scope: GMAIL_SCOPE,
    callback: () => {},
  });
}
window.onGisReady = initGis;

function ensureGmailToken(){
  return new Promise((resolve, reject) => {
    if(gmailConnected()){ resolve(gmailAccessToken); return; }
    if(!window.__gisLoaded){ reject(new Error('Google knihovna se ještě nenačetla, zkus to za chvíli znovu.')); return; }
    if(!settings.googleClientId){ reject(new Error('Chybí Google Client ID — vyplň ho v nastavení appky.')); return; }
    if(!gisTokenClient) initGis();
    if(!gisTokenClient){ reject(new Error('Gmail se nepodařilo inicializovat.')); return; }
    gisTokenClient.callback = (resp) => {
      if(resp.error){ reject(new Error(resp.error)); return; }
      gmailAccessToken = resp.access_token;
      gmailTokenExpiresAt = Date.now() + (resp.expires_in*1000 - 60000);
      resolve(gmailAccessToken);
    };
    gisTokenClient.requestAccessToken({ prompt: gmailAccessToken ? '' : 'consent' });
  });
}

function base64UrlEncode(str){
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function mimeEncodeWord(text){
  const bytes = new TextEncoder().encode(text);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return '=?UTF-8?B?' + btoa(binary) + '?=';
}

async function sendViaGmail(to, subject, bodyText){
  const token = await ensureGmailToken();
  const raw = base64UrlEncode([
    `To: ${to}`,
    'Content-Type: text/plain; charset="UTF-8"',
    'MIME-Version: 1.0',
    `Subject: ${mimeEncodeWord(subject)}`,
    '',
    bodyText,
  ].join('\r\n'));
  const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ raw }),
  });
  if(!res.ok){
    const errText = await res.text();
    throw new Error('Gmail API: ' + errText);
  }
  return res.json();
}

function dateOnly(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(date, days){ const d = new Date(date); d.setDate(d.getDate()+days); return d; }
function fmt(d){ const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yyyy=d.getFullYear(); return `${dd}-${mm}-${yyyy}`; }
function todayMid(){ return dateOnly(new Date()); }
function kc(n){ return (n||0).toLocaleString('cs-CZ') + ' Kč'; }

function itemDueDate(w, item){ return addDays(dateOnly(w.date), item.offset); }

function itemStatus(w, item){
  const state = w.items[item.key];
  if(state.done) return 'done';
  const diffDays = Math.round((itemDueDate(w,item) - todayMid()) / 86400000);
  if(diffDays < 0) return 'late';
  if(diffDays <= 2) return 'soon';
  return 'neutral';
}
function badgeText(w, item, status){
  const due = itemDueDate(w,item);
  if(status === 'done') return 'Hotovo';
  if(status === 'late') return 'Po termínu · ' + fmt(due);
  return fmt(due);
}
function weddingProgress(w){
  const total = ALL_ITEMS.length;
  const done = ALL_ITEMS.filter(i => w.items[i.key].done).length;
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function nextOpenItem(w){
  const open = ALL_ITEMS.filter(i => !w.items[i.key].done)
    .map(i => ({ item:i, due:itemDueDate(w,i) })).sort((a,b) => a.due - b.due);
  return open[0] || null;
}

function financeTotal(w){
  const shiftsTotal = w.finance.shifts.reduce((s,x) => s + (x.people||0)*(x.hours||0)*(x.rate||0), 0);
  const flatTotal = w.finance.flatItems.reduce((s,x) => s + (x.amount||0), 0);
  return shiftsTotal + flatTotal;
}

  'Úklid paušál': 'Úklid baru',
  'Doplatek nájem': 'Doplatek nájmu',

function flatItemLine(f){
  const rawLabel = f.label || '';

  const amtStr = (f.amount !== null && f.amount !== undefined) ? kc(f.amount) : '[částka]';
  return `${sectionName}: ${amtStr}`;
}

function wheelSvg(pct, size){
  size = size || 56;
  const r = size/2 - 6, c = size/2;
  const circumference = 2*Math.PI*r;
  const offset = circumference * (1 - pct/100);
  let spokeLines = '';
  for(let k=0;k<8;k++){
    const a = (k/8) * Math.PI*2;
    const x1 = c + Math.cos(a)*(r-9), y1 = c + Math.sin(a)*(r-9);
    const x2 = c + Math.cos(a)*r, y2 = c + Math.sin(a)*r;
    spokeLines += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#463c34" stroke-width="2"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#332c27" stroke-width="5"/>
    ${spokeLines}
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#6fa3bd" stroke-width="5"
      stroke-dasharray="${circumference.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 ${c} ${c})"/>
    <circle cx="${c}" cy="${c}" r="3" fill="#d6a541"/></svg>`;
}

}

function renderChecklistTab(w){
  const AUTO_KEY_MAP = { 'guestbook': 'auto_guestbook', 'calculation': 'auto_calculation', 'final_invoice': 'auto_final_invoice', 'thank_you': 'auto_thank_you' };
  const allItems = TEMPLATE.flatMap(p => p.items);

  function renderItem(item){
    const state = w.items[item.key];
    const isEmail = !!(item.emailType || item.email);
    const autoKey = item.emailType ? AUTO_KEY_MAP[item.emailType] : (item.email ? 'auto_guestbook' : null);
    const sentTs = autoKey && w.sentAutomations && w.sentAutomations[autoKey]
      ? `<div style="display:inline-flex;align-items:center;gap:5px;background:var(--green);color:#1b2614;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px;">✓ odesláno ${fmt(new Date(w.sentAutomations[autoKey]))}</div>`
      : (state.done && state.doneAt
        ? `<div style="display:inline-flex;align-items:center;gap:5px;background:var(--panel-2);color:var(--paper-dim);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px;">✓ splněno ${fmt(new Date(state.doneAt))}</div>`
        : '');

    let gmailBtn = '';
    if(item.email){
      const canSend = w.contactEmail && w.guestbookLink;
      gmailBtn = canSend && gmailConnected()
        ? `<button class="small" data-action="send-gmail-item" data-key="${item.key}">Gmail ↗</button>`
        : `<button class="small" disabled title="${!w.contactEmail ? 'Chybí e-mail páru' : !w.guestbookLink ? 'Chybí odkaz' : 'Gmail není připojen'}">Gmail ↗</button>`;
    } else if(item.emailType === 'calculation'){
      const can = !!w.contactEmail;
      gmailBtn = can && gmailConnected()
        ? `<button class="small" data-action="send-gmail-calc">Gmail ↗</button>`
        : `<button class="small" disabled title="${!w.contactEmail ? 'Chybí e-mail páru' : 'Gmail není připojen'}">Gmail ↗</button>`;
    } else if(item.emailType === 'final_invoice'){
      const can = !!w.contactEmail;
      gmailBtn = can && gmailConnected()
        ? `<button class="small" data-action="send-gmail-final-invoice">Gmail ↗</button>`
        : `<button class="small" disabled title="${!w.contactEmail ? 'Chybí e-mail páru' : 'Gmail není připojen'}">Gmail ↗</button>`;
    } else if(item.emailType === 'thank_you'){
      const can = !!w.contactEmail;
      gmailBtn = can && gmailConnected()
        ? `<button class="small" data-action="send-gmail-thank-you">Gmail ↗</button>`
        : `<button class="small" disabled title="${!w.contactEmail ? 'Chybí e-mail páru' : 'Gmail není připojen'}">Gmail ↗</button>`;
    }

    const guestbookInput = item.email
      ? `<input type="text" placeholder="Odkaz na knihu hostů…" value="${escapeHtml(w.guestbookLink)}" data-action="bind-guestbook-link" data-key="${item.key}" style="font-size:11px;padding:3px 6px;width:100%;margin-top:4px;box-sizing:border-box;"/>`
      : '';

    const extraLink = item.link
      ? `<a class="item-link" href="${item.link}" target="_blank" rel="noopener" style="font-size:11px;">${escapeHtml(item.linkLabel||'Odkaz')} ↗</a>`
      : '';
    const qrBtn = item.qrImg
      ? `<button class="item-link" style="cursor:pointer;background:none;border:none;padding:0;font-size:11px;font:inherit;" data-action="show-qr" data-img="${escapeHtml(item.qrImg)}" data-label="${escapeHtml(item.label)}">QR platba ↗</button>`
      : '';

    const dueDate = isEmail ? `<div style="font-size:10px;color:var(--paper-dim);margin-top:2px;">Termín: ${fmt(itemDueDate(w, item))}</div>` : '';

    return `
    <div style="display:grid;grid-template-columns:18px 1fr auto;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);align-items:start;">
      <div class="checkbox ${state.done?'checked':''}" data-action="toggle-item" data-key="${item.key}" style="margin-top:2px;">${state.done?'✓':''}</div>
      <div>
        <div style="font-size:13px;font-weight:500;color:${state.done?'var(--paper-dim)':'var(--ink)'};${state.done?'text-decoration:line-through;':''}">${escapeHtml(item.label)}</div>
        ${dueDate}${sentTs}${guestbookInput}${extraLink}${qrBtn}
      </div>
      <div style="display:flex;align-items:flex-start;padding-top:1px;">${gmailBtn}</div>
    </div>`;
  }

  const emailItems = allItems.filter(i => i.emailType || i.email);
  const payItems   = allItems.filter(i => !i.emailType && !i.email);

  const colLabel = txt => `<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--paper-dim);padding-bottom:4px;border-bottom:2px solid var(--line);margin-bottom:2px;">${txt}</div>`;

  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px;align-items:start;">
    <div>${colLabel('Úhrady')}${payItems.map(renderItem).join('')}</div>
    <div>${colLabel('E-maily')}${emailItems.map(renderItem).join('')}</div>
  </div>`;
}

      <input type="number" min="0" placeholder="lidí" value="${s.people ?? ''}" data-action="fin-shift" data-field="people" data-idx="${idx}"/>
      <input type="number" min="0" placeholder="h" value="${s.hours ?? ''}" data-action="fin-shift" data-field="hours" data-idx="${idx}"/>

function renderDetail(){
  const w = weddings.find(x => x.id === view.weddingId);
  if(!w){ view.mode = 'list'; return renderList(); }
  const prog = weddingProgress(w);
  const tabs = [['checklist','Checklist'],['info','Info & lidé'],['finance','Finance']];
  const tabsHtml = tabs.map(([key,label]) => `<div class="tab ${view.tab===key?'active':''}" data-action="set-tab" data-tab="${key}">${label}</div>`).join('');

  if(view.tab === 'checklist') tabBody = renderChecklistTab(w);
  else if(view.tab === 'info') tabBody = renderInfoTab(w);

  return `
    <div class="back" data-action="back-to-list">← Zpět na přehled</div>

      ${wheelSvg(prog.pct, 64)}

        <div class="detail-title">${escapeHtml(w.coupleName)}</div>
        <div class="detail-date mono">${fmt(new Date(w.date))} · ${prog.done}/${prog.total} bodů splněno</div>
        <div class="progress-track" style="width:220px;"><div class="progress-fill" style="width:${prog.pct}%;"></div></div>

        <h2>Nová svatba</h2>

        <div class="field"><label>Koordinátor</label>

function attachEvents(){
  document.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', onAction));
  document.querySelectorAll('[data-action="note-item"]').forEach(el => el.addEventListener('change', onNoteChange));
  document.querySelectorAll('[data-bind]').forEach(el => el.addEventListener('change', onBindChange));
  document.querySelectorAll('[data-action="fin-shift"]').forEach(el => el.addEventListener('change', onFinShiftChange));
  document.querySelectorAll('[data-action="fin-flat"]').forEach(el => el.addEventListener('change', onFinFlatChange));
  const filterEl = document.getElementById('coord-filter');
  if(filterEl) filterEl.addEventListener('change', e => { coordFilter = e.target.value; render(); });
  const upcomingEl = document.getElementById('upcoming-filter');
  if(upcomingEl) upcomingEl.addEventListener('change', e => { upcomingOnly = e.target.checked; render(); });
  const sigEl = document.getElementById('signature-input');
  if(sigEl) sigEl.addEventListener('change', e => { settings.signature = e.target.value; persistSettings(); });
  const clientIdEl = document.getElementById('google-clientid-input');
  if(clientIdEl) clientIdEl.addEventListener('change', e => {
    settings.googleClientId = e.target.value.trim();
    gmailAccessToken = null; gmailTokenExpiresAt = 0;
    persistSettings();
    initGis();
    render();
  });
  document.querySelectorAll('[data-action="bind-guestbook-link"]').forEach(el => el.addEventListener('change', e => {
    const w = currentWedding(); if(!w) return;
    w.guestbookLink = e.target.value;
    persist();
  }));
  const bg = document.querySelector('[data-action="modal-bg"]');
  if(bg){
    bg.addEventListener('click', e => { if(e.target === bg){ modal = null; render(); } });
    const inner = bg.querySelector('[data-stop]');
    if(inner) inner.addEventListener('click', e => e.stopPropagation());
  }
}

function currentWedding(){ return weddings.find(x => x.id === view.weddingId); }

function onNoteChange(e){
  const w = currentWedding(); if(!w) return;
  w.items[e.target.getAttribute('data-key')].note = e.target.value;
  persist();
}

function onBindChange(e){
  const w = currentWedding(); if(!w) return;
  const field = e.target.getAttribute('data-bind');
  let val = e.target.value;
  if(['guests','staffPlanned','rentDeposit','rentBalance'].includes(field)){
    val = val === '' ? null : Number(val);
  }
  w[field] = val;
  persist();
  render();
}

function onFinShiftChange(e){
  const w = currentWedding(); if(!w) return;
  const idx = Number(e.target.getAttribute('data-idx'));
  const field = e.target.getAttribute('data-field');
  let val = e.target.value;
  if(field !== 'label') val = val === '' ? null : Number(val);
  w.finance.shifts[idx][field] = val;
  persist();
  render();
}

function onFinFlatChange(e){
  const w = currentWedding(); if(!w) return;
  const idx = Number(e.target.getAttribute('data-idx'));
  const field = e.target.getAttribute('data-field');
  let val = e.target.value;
  if(field === 'amount') val = val === '' ? null : Number(val);
  w.finance.flatItems[idx][field] = val;
  persist();
  render();
}

async function onAction(e){
  const action = e.currentTarget.getAttribute('data-action');
  const id = e.currentTarget.getAttribute('data-id');
  const w = currentWedding();

  if(action === 'connect-gmail'){
    try{
      await ensureGmailToken();
      render();
    }catch(err){ alert(err.message); }
    return;
  }

  if(action === 'new-wedding'){ openNewWeddingModal(); return; }
  if(action === 'check-automations'){
    const pending = collectPendingAutomations();
    if(pending.length) showAutomationPrompt(pending);
    else alert('Žádné automatické e-maily k odeslání.');
    return;
  }
  if(action === 'import-seed'){
    const added = importSeedWeddings();
    alert(added > 0 ? `Nahráno ${added} nových svateb.` : 'Všechny svatby ze seedu už jsou založené.');
    return;
  }
  if(action === 'modal-cancel'){ modal = null; render(); return; }

  if(action === 'auto-dismiss-one'){
    const idx = Number(e.currentTarget.getAttribute('data-idx'));
    const pending = modal.pending;
    if(!pending || !pending[idx]) return;
    const { w, a } = pending[idx];
    w.sentAutomations[a.key] = new Date().toISOString();
    if(a.itemKey && w.items[a.itemKey]){
      w.items[a.itemKey].done = true;
      w.items[a.itemKey].doneAt = Date.now();
    }
    await persist();
    pending.splice(idx, 1);
    if(pending.length) showAutomationPrompt(pending);
    else { modal = null; render(); }
    return;
  }
  if(action === 'auto-send-one'){
    const idx = Number(e.currentTarget.getAttribute('data-idx'));
    const pending = modal.pending;
    if(!pending || !pending[idx]) return;
    const { w, a } = pending[idx];
    const email = getAutomationEmailBody(w, a.emailType);
    if(!email) return;
    e.currentTarget.disabled = true;
    e.currentTarget.textContent = 'Odesílám…';
    try{
      await sendViaGmail(w.contactEmail, email.subject, email.body);
      w.sentAutomations[a.key] = new Date().toISOString();
      if(a.itemKey && w.items[a.itemKey]) w.items[a.itemKey].done = true;
      await persist();
      pending.splice(idx, 1);
      if(pending.length === 0){ modal = null; render(); }
      else showAutomationPrompt(pending);
    }catch(err){
      alert('Odeslání se nezdařilo: ' + err.message);
      render();
    }
    return;
  }

  if(action === 'auto-send-all'){
    const pending = modal.pending;
    if(!pending || !pending.length) return;
    e.currentTarget.disabled = true;
    e.currentTarget.textContent = 'Odesílám…';
    const errors = [];
    for(const { w, a } of pending){
      const email = getAutomationEmailBody(w, a.emailType);
      if(!email) continue;
      try{
        await sendViaGmail(w.contactEmail, email.subject, email.body);
        w.sentAutomations[a.key] = new Date().toISOString();
        if(a.itemKey && w.items[a.itemKey]) w.items[a.itemKey].done = true;
      }catch(err){ errors.push(`${w.coupleName} / ${a.label}: ${err.message}`); }
    }
    await persist();
    modal = null;
    render();
    if(errors.length) alert('Některé e-maily se nepodařilo odeslat:\n' + errors.join('\n'));
    return;
  }
  if(action === 'modal-save'){
    const coupleEl = document.getElementById('m-couple');
    const dateEl = document.getElementById('m-date');
    const coordEl = document.getElementById('m-coord');
    const couple = coupleEl.value.trim();
    const date = dateEl.value;
    if(!couple || !date){
      coupleEl.style.borderColor = couple ? 'var(--line)' : 'var(--red)';
      dateEl.style.borderColor = date ? 'var(--line)' : 'var(--red)';
      return;
    }
    const nw = freshWedding(couple, date);
    nw.coordinator = coordEl.value;
    weddings.push(nw);
    modal = null;
    persist();
    render();
    return;
  }
  if(action === 'open-wedding'){ view = { mode:'detail', weddingId:id, tab:'info' }; render(); return; }
  if(action === 'back-to-list'){ view = { mode:'list', weddingId:null, tab:'checklist' }; render(); return; }
  if(action === 'set-tab'){
    view.tab = e.currentTarget.getAttribute('data-tab');
    if(view.tab === 'finance' && w && w.finance.shifts.length === 0 && w.staffPlanned > 0){
      for(let i = 0; i < w.staffPlanned; i++){
        w.finance.shifts.push({ label: `Obsluha ${i+1}`, people: 1, hours: 8, rate: 250 });
      }
      persist();
    }
    render(); return;
  }
  if(action === 'sync-shifts-from-info'){
    if(!w || !w.staffPlanned) return;
    w.finance.shifts = [];
    for(let i = 0; i < w.staffPlanned; i++){
      w.finance.shifts.push({ label: `Obsluha ${i+1}`, people: 1, hours: 8, rate: 250 });
    }
    persist(); render(); return;
  }
  if(action === 'delete-wedding'){
    e.stopPropagation();
    if(confirm('Smazat tuto svatbu a celý její checklist?')){
      weddings = weddings.filter(x => x.id !== id);
      persist(); render();
    }
    return;
  }
  if(action === 'show-qr'){
    const img = e.currentTarget.getAttribute('data-img');
    const label = e.currentTarget.getAttribute('data-label');
    modal = { html: `
      <div class="modal-bg" data-action="modal-cancel">
        <div class="modal" style="text-align:center;max-width:320px;" onclick="event.stopPropagation()">
          <h2>${escapeHtml(label)}</h2>
          <img src="${escapeHtml(img)}" alt="QR kód" style="width:100%;border-radius:8px;display:block;"/>
          <div class="modal-actions" style="justify-content:center;margin-top:14px;">
            <button data-action="modal-cancel">Zavřít</button>
          </div>
        </div>
      </div>` };
    render();
    return;
  }
  if(action === 'toggle-item'){
    if(!w) return;
    const key = e.currentTarget.getAttribute('data-key');
    w.items[key].done = !w.items[key].done;
    w.items[key].doneAt = w.items[key].done ? Date.now() : null;
    persist(); render();
    return;
  }
  if(!w) return;

  if(action === 'add-name'){
    const kind = e.currentTarget.getAttribute('data-kind');
    const inputId = kind === 'serviceNames' ? 'new-service-name' : 'new-cleaning-name';
    const inp = document.getElementById(inputId);
    const val = inp.value.trim();
    if(val){ w[kind].push(val); persist(); render(); }
    return;
  }
  if(action === 'remove-name'){
    const kind = e.currentTarget.getAttribute('data-kind');
    const idx = Number(e.currentTarget.getAttribute('data-idx'));
    w[kind].splice(idx,1);
    persist(); render();
    return;
  }
  if(action === 'fin-add-shift'){
    w.finance.shifts.push({ label:'', people:2, hours:8, rate:250 });
    persist(); render();
    return;
  }
  if(action === 'fin-remove-shift'){
    w.finance.shifts.splice(Number(e.currentTarget.getAttribute('data-idx')),1);
    persist(); render();
    return;
  }
  if(action === 'fin-quickadd'){
    const label = e.currentTarget.getAttribute('data-label');
    const amt = e.currentTarget.getAttribute('data-amount');
    let amount = amt ? Number(amt) : null;
    if(label.toLowerCase().includes('doplatek nájem') && w.rentBalance !== null && w.rentBalance !== undefined){
      amount = w.rentBalance;
    }
    w.finance.flatItems.push({ label, amount });
    persist(); render();
    return;
  }
  if(action === 'fin-remove-flat'){
    w.finance.flatItems.splice(Number(e.currentTarget.getAttribute('data-idx')),1);
    persist(); render();
    return;
  }
  if(action === 'copy-message'){
    const ta = document.getElementById('msg-preview');
    ta.select();
    try{ document.execCommand('copy'); }catch(err){}
    return;
  }
  if(action === 'send-gmail-item'){
    const key = e.currentTarget.getAttribute('data-key');
    const item = ALL_ITEMS.find(i => i.key === key);
    if(!item || !item.email) return;

    e.currentTarget.disabled = true;
    e.currentTarget.textContent = 'Odesílám…';
    try{

      alert('E-mail byl odeslán přes Gmail.');

window.__onLogin = load;

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  if(btn){
    btn.addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Přihlašuji…';
      try{
        await window.__fbLogin(email, password);
      }catch(e){
        errEl.textContent = 'Špatný e-mail nebo heslo.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Přihlásit se';
      }
    });
    document.getElementById('login-password').addEventListener('keydown', e => {
      if(e.key === 'Enter') btn.click();
    });
  }
});
</script>
